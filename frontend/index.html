<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JobMatch AI — Find Your Perfect Role</title>

<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #F0EDE8;
  --surface: #FAFAF8;
  --dark: #1A1A1A;
  --accent: #FF4D00;
  --muted: #8A8A82;
  --border: #E0DDD8;
  --success: #00A878;
  --warning: #FFB800;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  font-family: 'Cabinet Grotesk', sans-serif;
  color: var(--dark);
}

/* NAV */

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 48px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}

.logo {
  font-family:'Clash Display', sans-serif;
  font-size:22px;
  font-weight:700;
}

.logo span {
  color:var(--accent);
}

.nav-right {
  display:flex;
  gap:12px;
}

.btn-nav {
  padding:10px 18px;
  border-radius:100px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.btn-solid {
  background:var(--dark);
  color:white;
}

/* HERO */

.hero {
  max-width:900px;
  margin:0 auto;
  padding:80px 20px;
  text-align:center;
}

.hero-badge {
  display:inline-block;
  background:var(--dark);
  color:white;
  padding:6px 14px;
  border-radius:100px;
  font-size:12px;
  margin-bottom:24px;
}

h1 {
  font-family:'Clash Display', sans-serif;
  font-size:64px;
  line-height:1;
  margin-bottom:20px;
}

h1 em {
  color:var(--accent);
  font-style:normal;
}

.hero-sub {
  color:var(--muted);
  font-size:18px;
  max-width:600px;
  margin:0 auto 40px;
}

/* UPLOAD */

.upload-card {
  background:var(--surface);
  border:2px dashed var(--border);
  border-radius:24px;
  padding:50px;
  cursor:pointer;
  transition:0.3s;
}

.upload-card:hover {
  border-color:var(--accent);
}

.upload-icon {
  font-size:50px;
  margin-bottom:16px;
}

.upload-title {
  font-size:24px;
  font-weight:700;
  margin-bottom:8px;
}

.upload-sub {
  color:var(--muted);
  margin-bottom:24px;
}

.upload-btn {
  background:var(--accent);
  color:white;
  border:none;
  padding:14px 28px;
  border-radius:100px;
  font-weight:700;
  cursor:pointer;
}

#fileInput {
  display:none;
}

/* LOADING */

#loadingSection {
  display:none;
  text-align:center;
  padding:100px 20px;
}

.loader-ring {
  width:70px;
  height:70px;
  border:4px solid var(--border);
  border-top:4px solid var(--accent);
  border-radius:50%;
  margin:0 auto 20px;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to {
    transform:rotate(360deg);
  }
}

/* RESULTS */

#resultsSection {
  display:none;
  max-width:1000px;
  margin:0 auto;
  padding:40px 20px 100px;
}

.results-title {
  font-size:36px;
  font-family:'Clash Display', sans-serif;
  margin-bottom:12px;
}

.results-sub {
  color:var(--muted);
  margin-bottom:30px;
}

/* KEYWORDS */

.keywords {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:30px;
}

.keyword {
  background:var(--surface);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:100px;
  font-size:14px;
}

/* JOB CARD */

.jobs-grid {
  display:flex;
  flex-direction:column;
  gap:20px;
}

.job-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:24px;
}

.job-top {
  display:flex;
  justify-content:space-between;
  gap:20px;
}

.job-company {
  font-size:12px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
}

.job-title {
  font-size:24px;
  font-weight:700;
  margin-bottom:10px;
}

.job-details {
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:14px;
}

.match-score {
  min-width:80px;
  height:80px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:700;
  border:4px solid var(--success);
  color:var(--success);
}

.job-keywords {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:20px 0;
}

.job-keyword {
  background:#eef8f4;
  color:var(--success);
  padding:6px 12px;
  border-radius:100px;
  font-size:12px;
}

.job-footer {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.apply-btn {
  background:var(--dark);
  color:white;
  padding:12px 24px;
  border-radius:100px;
  text-decoration:none;
  font-weight:700;
}

@media(max-width:700px) {

  h1 {
    font-size:42px;
  }

  .job-top {
    flex-direction:column;
  }

}
</style>
</head>

<body>

<nav>
  <div class="logo">Job<span>Match</span> AI</div>

  <div class="nav-right">
    <button class="btn-nav">Sign in</button>
    <button class="btn-nav btn-solid">Get Pro</button>
  </div>
</nav>

<!-- HERO -->

<section id="heroSection">

  <div class="hero">

    <div class="hero-badge">
      AI-Powered Job Matching
    </div>

    <h1>
      Your CV.<br/>
      <em>Your perfect job.</em>
    </h1>

    <p class="hero-sub">
      Upload your CV and instantly discover AI-matched jobs tailored to your skills and experience.
    </p>

    <div class="upload-card" id="uploadCard">

      <div class="upload-icon">📄</div>

      <div class="upload-title">
        Upload your CV
      </div>

      <div class="upload-sub">
        PDF, DOCX or TXT
      </div>

      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        Analyse my CV
      </button>

      <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt"/>

    </div>

  </div>

</section>

<!-- LOADING -->

<section id="loadingSection">

  <div class="loader-ring"></div>

  <h2>Analysing your CV...</h2>

</section>

<!-- RESULTS -->

<section id="resultsSection">

  <h2 class="results-title" id="resultsTitle"></h2>

  <p class="results-sub" id="resultsSub"></p>

  <div class="keywords" id="keywords"></div>

  <div class="jobs-grid" id="jobsGrid"></div>

</section>

<script>

const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', async () => {

  const file = fileInput.files[0];

  if (!file) return;

  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('loadingSection').style.display = 'block';

  const text = await file.text();

  try {

    const result = await analyseCV(text);

    renderResults(result);

  } catch(err) {

    alert("Something went wrong");

    console.error(err);

  }

});

async function analyseCV(cvText) {

  const response = await fetch("https://YOUR-RAILWAY-URL/api/analyse", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      cvText
    })

  });

  if (!response.ok) {
    throw new Error("Backend failed");
  }

  const data = await response.json();

  return JSON.parse(data.result);

}

function renderResults(data) {

  document.getElementById('loadingSection').style.display = 'none';

  document.getElementById('resultsSection').style.display = 'block';

  document.getElementById('resultsTitle').innerText =
    `${data.jobs.length} job matches found`;

  document.getElementById('resultsSub').innerText =
    `Top role detected: ${data.jobTitle}`;

  // KEYWORDS

  const keywordsContainer = document.getElementById('keywords');

  keywordsContainer.innerHTML = '';

  data.keywords.forEach(keyword => {

    const el = document.createElement('div');

    el.className = 'keyword';

    el.innerText = keyword;

    keywordsContainer.appendChild(el);

  });

  // JOBS

  const jobsGrid = document.getElementById('jobsGrid');

  jobsGrid.innerHTML = '';

  data.jobs.forEach(job => {

    const card = document.createElement('div');

    card.className = 'job-card';

    card.innerHTML = `

      <div class="job-top">

        <div>

          <div class="job-company">
            ${job.company}
          </div>

          <div class="job-title">
            ${job.title}
          </div>

          <div class="job-details">
            <span>📍 ${job.location}</span>
            <span>💼 ${job.type}</span>
            <span>💷 ${job.salary}</span>
          </div>

        </div>

        <div class="match-score">
          ${job.matchScore}%
        </div>

      </div>

      <div class="job-keywords">

        ${(job.matchedKeywords || []).map(keyword => `
          <div class="job-keyword">
            ${keyword}
          </div>
        `).join('')}

      </div>

      <div class="job-footer">

        <div>
          Posted ${job.postedDays} days ago
        </div>

        <a class="apply-btn"
           href="${job.applyUrl}"
           target="_blank">
           Apply Now →
        </a>

      </div>

    `;

    jobsGrid.appendChild(card);

  });

}

</script>

</body>
</html>
